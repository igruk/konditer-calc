<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кондитерська калькуляція</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Inter:ital,wght@0,400;0,500;0,600;0,700&display=swap');

:root{
  --bg:#F1F0E9; --ink:#2C2620; --muted:#8A8375; --line:#DBD8CB;
  --panel:#FAF9F4; --pist:#71904F; --pist-soft:#E8EDDC;
  --berry:#A94459; --rpaper:#FFFEFA;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.45;}
.kc-wrap{max-width:1080px;margin:0 auto;padding:28px 20px 60px;}
.kc-h1{font-family:'Unbounded',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.01em;}
.kc-sub{color:var(--muted);font-size:13px;margin-top:4px;}
.kc-topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.kc-io{display:flex;gap:8px;flex-wrap:wrap;}
.kc-tabs{display:flex;gap:8px;margin:22px 0 18px;flex-wrap:wrap;}
.kc-tab{border:1px solid var(--line);background:transparent;color:var(--ink);
  padding:8px 16px;border-radius:999px;font:inherit;font-weight:600;font-size:13px;cursor:pointer;}
.kc-tab:hover{background:var(--panel);}
.kc-tab.on{background:var(--ink);color:var(--rpaper);border-color:var(--ink);}
.kc-panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;}
.kc-grid{display:grid;gap:16px;grid-template-columns:1fr;align-items:start;}
@media(min-width:820px){.kc-grid{grid-template-columns:230px 1fr;}
  .kc-grid.wide{grid-template-columns:230px 1fr 340px;}}
.kc-list{display:flex;flex-direction:column;gap:6px;}
.kc-li{text-align:left;border:1px solid transparent;background:transparent;border-radius:10px;
  padding:9px 12px;font:inherit;cursor:pointer;color:var(--ink);width:100%;}
.kc-li:hover{background:var(--pist-soft);}
.kc-li.on{background:var(--pist-soft);border-color:var(--pist);font-weight:600;}
.kc-li small{display:block;color:var(--muted);font-weight:400;}
.kc-inp{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 9px;
  font:inherit;color:var(--ink);width:100%;min-width:0;}
.kc-inp:focus,.kc-tab:focus-visible,.kc-btn:focus-visible,.kc-li:focus-visible,
.kc-chip:focus-visible,.kc-x:focus-visible,.kc-exp:focus-visible{
  outline:2px solid var(--pist);outline-offset:1px;}
.kc-inp.num{text-align:right;font-variant-numeric:tabular-nums;}
.kc-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 13px;
  font:inherit;font-weight:600;font-size:13px;cursor:pointer;color:var(--ink);}
.kc-btn:hover{border-color:var(--pist);color:var(--pist);}
.kc-btn.acc{background:var(--pist);border-color:var(--pist);color:#fff;}
.kc-btn.acc:hover{filter:brightness(1.07);color:#fff;}
.kc-x{border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;
  padding:2px 6px;border-radius:6px;line-height:1;font-family:inherit;}
.kc-x:hover{color:var(--berry);background:#F3E3E6;}
.kc-x.txt{font-size:13px;}
.kc-table{width:100%;border-collapse:collapse;}
.kc-table th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);
  text-align:left;font-weight:600;padding:4px 8px 8px;}
.kc-table td{padding:4px 4px;vertical-align:middle;}
.kc-table td.r,.kc-table th.r{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
.kc-price{color:var(--berry);font-weight:600;font-variant-numeric:tabular-nums;}
.kc-dim{color:var(--muted);font-weight:400;}
.kc-sect{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
  font-weight:700;margin:16px 0 8px;}
.kc-sect.first{margin-top:0;margin-bottom:6px;}
.kc-receipt{background:var(--rpaper);border:1px solid var(--line);border-bottom:none;
  border-radius:12px 12px 0 0;padding:20px 18px 14px;box-shadow:0 10px 24px rgba(44,38,32,.08);}
.kc-saw{height:11px;filter:drop-shadow(0 6px 6px rgba(44,38,32,.06));
  background-image:linear-gradient(-45deg,var(--rpaper) 6px,transparent 0),
    linear-gradient(45deg,var(--rpaper) 6px,transparent 0);
  background-repeat:repeat-x;background-size:12px 12px;background-position:left top;}
.kc-lead{display:flex;align-items:baseline;gap:8px;padding:3px 0;}
.kc-lead .n{flex:0 1 auto;min-width:0;}
.kc-lead .dots{flex:1 1 12px;border-bottom:2px dotted var(--line);transform:translateY(-3px);}
.kc-lead .v{flex:0 0 auto;font-variant-numeric:tabular-nums;white-space:nowrap;}
.kc-lead.sub{font-size:12.5px;color:var(--muted);padding-left:14px;}
.kc-lead.total .n,.kc-lead.total .v{font-weight:700;}
.kc-rt{font-family:'Unbounded',sans-serif;font-weight:500;font-size:15px;}
.kc-rs{color:var(--muted);font-size:12px;margin-bottom:12px;}
.kc-hr{border:none;border-top:1px dashed var(--line);margin:10px 0;}
.kc-final{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;}
.kc-final .lbl{font-family:'Unbounded',sans-serif;font-weight:500;font-size:13px;}
.kc-final .p{font-family:'Unbounded',sans-serif;font-weight:700;font-size:21px;color:var(--berry);}
.kc-exact{text-align:right;color:var(--muted);font-size:12px;}
.kc-chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 13px;
  font:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);}
.kc-chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.kc-note{color:var(--muted);font-size:12px;margin-top:26px;text-align:center;}
.kc-empty{color:var(--muted);padding:24px;text-align:center;}
.kc-exp{border:none;background:none;cursor:pointer;color:var(--pist);font:inherit;
  font-size:12px;padding:0;font-weight:600;}
.kc-flex{display:flex;gap:10px;flex-wrap:wrap;}
.kc-sizes-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));margin-top:12px;}
.kc-snap-grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));align-items:start;}
.kc-saved{color:var(--pist);font-size:12px;font-weight:600;opacity:0;transition:opacity .4s;}
.kc-saved.show{opacity:1;}
@media(prefers-reduced-motion:no-preference){
  .kc-li,.kc-tab,.kc-btn,.kc-chip{transition:background .12s,color .12s,border-color .12s;}}
@media print{
  body.pr *{visibility:hidden;}
  body.pr #print-zone,body.pr #print-zone *{visibility:visible;}
  body.pr #print-zone{position:absolute;left:0;top:0;width:100%;}
  body.pr #print-zone .kc-receipt{box-shadow:none;}
  body.pr #print-zone .no-print{display:none;}
}
</style>
</head>
<body>
<div class="kc-wrap">
  <div class="kc-topbar">
    <div>
      <div class="kc-h1">Кондитерська калькуляція</div>
      <div class="kc-sub">Ціни продуктів → собівартість складників → ціна виробу за розмірами</div>
    </div>
    <div class="kc-io">
      <span class="kc-saved" id="saved-ind">збережено ✓</span>
      <button class="kc-btn" data-action="export">Експорт даних</button>
      <button class="kc-btn" data-action="import">Імпорт даних</button>
      <input type="file" id="import-file" accept="application/json,.json" style="display:none">
    </div>
  </div>

  <div class="kc-tabs" id="tabs" role="tablist"></div>
  <div id="view"></div>

  <div class="kc-note">
    Дані зберігаються автоматично в цьому браузері на цьому пристрої.
    Час від часу натискайте «Експорт даних» — файл-копія стане в пригоді,
    якщо зміните пристрій або очистите історію браузера.
  </div>
</div>

<script>
"use strict";

/* ================= helpers ================= */

const num = v => {
  const n = parseFloat(String(v ?? "").replace(",", "."));
  return Number.isFinite(n) ? n : 0;
};
const fmt = n => new Intl.NumberFormat("uk-UA",
  { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n) + " ₴";
const qf = n => {
  const r = Math.round(n * 10) / 10;
  return String(Number.isInteger(r) ? r : r.toFixed(1)).replace(".", ",");
};
const esc = s => String(s ?? "").replace(/[&<>"']/g,
  c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
const uid = p => p + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

/* ================= seed data ================= */

const SEED = {
  v: 1,
  products: [
    { id:"p1",  name:"Борошно пшеничне",  packPrice:"42",  packQty:"1000", uom:"г",  category:"product" },
    { id:"p2",  name:"Цукор",             packPrice:"48",  packQty:"1000", uom:"г",  category:"product" },
    { id:"p3",  name:"Масло 82%",         packPrice:"118", packQty:"200",  uom:"г",  category:"product" },
    { id:"p4",  name:"Яйця",              packPrice:"75",  packQty:"10",   uom:"шт", category:"product" },
    { id:"p5",  name:"Вершки 33%",        packPrice:"165", packQty:"500",  uom:"мл", category:"product" },
    { id:"p6",  name:"Вершковий сир",     packPrice:"132", packQty:"300",  uom:"г",  category:"product" },
    { id:"p7",  name:"Шоколад чорний",    packPrice:"68",  packQty:"100",  uom:"г",  category:"product" },
    { id:"p8",  name:"Какао-порошок",     packPrice:"55",  packQty:"100",  uom:"г",  category:"product" },
    { id:"p9",  name:"Фісташкова паста",  packPrice:"480", packQty:"200",  uom:"г",  category:"product" },
    { id:"p10", name:"Коробка 20 см",     packPrice:"55",  packQty:"1",    uom:"шт", category:"packaging" },
    { id:"p11", name:"Коробка 25 см",     packPrice:"72",  packQty:"1",    uom:"шт", category:"packaging" },
    { id:"p12", name:"Підложка 20 см",    packPrice:"18",  packQty:"1",    uom:"шт", category:"packaging" },
    { id:"p13", name:"Підложка 26 см",    packPrice:"26",  packQty:"1",    uom:"шт", category:"packaging" },
    { id:"p14", name:"Стрічка атласна",   packPrice:"40",  packQty:"5",    uom:"м",  category:"packaging" },
    { id:"p15", name:"Ягоди для декору",  packPrice:"120", packQty:"250",  uom:"г",  category:"decor" },
    { id:"p16", name:"Накладні витрати (за виріб)", packPrice:"40", packQty:"1", uom:"шт", category:"consumables" }
  ],
  components: [
    { id:"c1", name:"Класичний бісквіт", yieldQty:"550", lines:[
      { id:"l1", productId:"p4", qty:"4" }, { id:"l2", productId:"p2", qty:"150" },
      { id:"l3", productId:"p1", qty:"130" }, { id:"l4", productId:"p3", qty:"30" } ] },
    { id:"c2", name:"Шоколадний бісквіт", yieldQty:"560", lines:[
      { id:"l5", productId:"p4", qty:"4" }, { id:"l6", productId:"p2", qty:"160" },
      { id:"l7", productId:"p1", qty:"110" }, { id:"l8", productId:"p8", qty:"30" },
      { id:"l9", productId:"p3", qty:"30" } ] },
    { id:"c3", name:"Ванільний крем", yieldQty:"660", lines:[
      { id:"l10", productId:"p5", qty:"300" }, { id:"l11", productId:"p6", qty:"300" },
      { id:"l12", productId:"p2", qty:"80" } ] },
    { id:"c4", name:"Фісташковий крем", yieldQty:"620", lines:[
      { id:"l13", productId:"p5", qty:"250" }, { id:"l14", productId:"p6", qty:"250" },
      { id:"l15", productId:"p2", qty:"60" }, { id:"l16", productId:"p9", qty:"80" } ] },
    { id:"c5", name:"Шоколадний ганаш", yieldQty:"200", lines:[
      { id:"l17", productId:"p7", qty:"100" }, { id:"l18", productId:"p5", qty:"100" } ] }
  ],
  items: [
    { id:"i1", name:"Торт «Фісташка»",
      lines:[ { id:"il1", componentId:"c1", qty:"500" }, { id:"il2", componentId:"c4", qty:"450" } ],
      sizes:[
        { id:"s1", name:"18 см", factor:"1", labor:"700", marginPct:"25", extraLines:[
          { id:"el1", productId:"p10", qty:"1" }, { id:"el2", productId:"p12", qty:"1" },
          { id:"el3", productId:"p14", qty:"1" } ] },
        { id:"s2", name:"22 см", factor:"1.5", labor:"900", marginPct:"25", extraLines:[
          { id:"el4", productId:"p11", qty:"1" }, { id:"el5", productId:"p13", qty:"1" },
          { id:"el6", productId:"p14", qty:"1" } ] } ] },
    { id:"i2", name:"Торт «Шоколадний»",
      lines:[ { id:"il3", componentId:"c2", qty:"520" }, { id:"il4", componentId:"c3", qty:"430" },
        { id:"il5", componentId:"c5", qty:"120" } ],
      sizes:[
        { id:"s3", name:"18 см", factor:"1", labor:"750", marginPct:"25", extraLines:[
          { id:"el7", productId:"p10", qty:"1" }, { id:"el8", productId:"p12", qty:"1" } ] } ] }
  ],
  snapshots: []
};

/* ================= state & persistence ================= */

const LS_KEY = "konditer-calc-v1";
let db;
try {
  const raw = localStorage.getItem(LS_KEY);
  db = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(SEED));
  if (!db || !Array.isArray(db.products)) throw new Error("bad data");
  db.snapshots = db.snapshots || [];
} catch (e) {
  db = JSON.parse(JSON.stringify(SEED));
}

const ui = {
  tab: "items",
  selComp: db.components[0]?.id,
  selItem: db.items[0]?.id,
  selSize: db.items[0]?.sizes[0]?.id,
  expanded: {}
};

let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(db));
      const ind = document.getElementById("saved-ind");
      ind.classList.add("show");
      setTimeout(() => ind.classList.remove("show"), 1200);
    } catch (e) {
      alert("Не вдалося зберегти дані в браузері. Зробіть «Експорт даних», щоб не втратити зміни.");
    }
  }, 250);
}

/* ================= calculations ================= */

const productById = id => db.products.find(p => p.id === id);
const compById = id => db.components.find(c => c.id === id);
const itemById = id => db.items.find(i => i.id === id);

const unitPrice = p => num(p.packQty) ? num(p.packPrice) / num(p.packQty) : 0;
const compCost = c => c.lines.reduce((s, l) => {
  const p = productById(l.productId);
  return s + (p ? num(l.qty) * unitPrice(p) : 0);
}, 0);
const compUnitCost = c => num(c.yieldQty) ? compCost(c) / num(c.yieldQty) : 0;

function buildBreakdown(item, size) {
  const f = num(size.factor) || 1;
  const compRows = item.lines.map(l => {
    const c = compById(l.componentId);
    if (!c) return null;
    const grams = num(l.qty) * f;
    const ratio = num(c.yieldQty) ? grams / num(c.yieldQty) : 0;
    const ingredients = c.lines.map(cl => {
      const p = productById(cl.productId);
      if (!p) return null;
      const q = num(cl.qty) * ratio;
      return { name: p.name, qty: q, uom: p.uom, cost: q * unitPrice(p) };
    }).filter(Boolean);
    return { name: c.name, qty: grams, cost: grams * compUnitCost(c), ingredients };
  }).filter(Boolean);

  const extraRows = (size.extraLines || []).map(l => {
    const p = productById(l.productId);
    if (!p) return null;
    return { name: p.name, qty: num(l.qty), uom: p.uom, cost: num(l.qty) * unitPrice(p) };
  }).filter(Boolean);

  const ingrCost = compRows.reduce((s, r) => s + r.cost, 0);
  const extraCost = extraRows.reduce((s, r) => s + r.cost, 0);
  const cost = ingrCost + extraCost;
  const labor = num(size.labor);
  const margin = num(size.marginPct);
  const price = (cost + labor) * (1 + margin / 100);
  return {
    itemName: item.name, sizeName: size.name, compRows, extraRows,
    cost, labor, margin, price, priceRounded: Math.ceil(price / 10) * 10
  };
}

/* ================= rendering ================= */

const TABS = [
  ["items", "Вироби"],
  ["comps", "Складники"],
  ["products", "Продукти"],
  ["snaps", "Розрахунки"]
];

function renderTabs() {
  document.getElementById("tabs").innerHTML = TABS.map(([id, label]) => {
    const extra = id === "snaps" && db.snapshots.length ? " · " + db.snapshots.length : "";
    return `<button role="tab" aria-selected="${ui.tab === id}"
      class="kc-tab${ui.tab === id ? " on" : ""}"
      data-action="tab" data-id="${id}">${label}${extra}</button>`;
  }).join("");
}

const CAT_MARK = { packaging: "📦 ", decor: "🎀 ", consumables: "🧾 " };
function productOptions(selected, markCats) {
  return db.products.map(p =>
    `<option value="${p.id}"${p.id === selected ? " selected" : ""}>${
      markCats && CAT_MARK[p.category] || ""}${esc(p.name)}</option>`).join("");
}

/* ----- products ----- */

function renderProducts() {
  const rows = db.products.map(p => `
    <tr>
      <td><input class="kc-inp" value="${esc(p.name)}"
        data-bind="1" data-t="product" data-id="${p.id}" data-k="name"></td>
      <td><select class="kc-inp" data-bindsel="1" data-t="product" data-id="${p.id}" data-k="category">
        <option value="product"${p.category === "product" ? " selected" : ""}>Сировина</option>
        <option value="packaging"${p.category === "packaging" ? " selected" : ""}>Пакування</option>
        <option value="decor"${p.category === "decor" ? " selected" : ""}>Декор</option>
        <option value="consumables"${p.category === "consumables" ? " selected" : ""}>Витратні</option>
      </select></td>
      <td class="r" style="width:110px"><input class="kc-inp num" inputmode="decimal" value="${esc(p.packPrice)}"
        data-bind="1" data-t="product" data-id="${p.id}" data-k="packPrice"></td>
      <td class="r" style="width:90px"><input class="kc-inp num" inputmode="decimal" value="${esc(p.packQty)}"
        data-bind="1" data-t="product" data-id="${p.id}" data-k="packQty"></td>
      <td style="width:70px"><select class="kc-inp" data-bindsel="1" data-t="product" data-id="${p.id}" data-k="uom">
        ${["г","мл","шт","м"].map(u => `<option${u === p.uom ? " selected" : ""}>${u}</option>`).join("")}
      </select></td>
      <td class="r"><span class="kc-price" data-up="${p.id}">${fmt(unitPrice(p))}</span>
        <span class="kc-dim"> / <span data-upu="${p.id}">${esc(p.uom)}</span></span></td>
      <td style="width:30px"><button class="kc-x" title="Видалити"
        data-action="del-product" data-id="${p.id}">×</button></td>
    </tr>`).join("");

  return `<div class="kc-panel" style="overflow-x:auto">
    <table class="kc-table" style="min-width:640px">
      <thead><tr>
        <th style="width:30%">Назва</th><th>Категорія</th>
        <th class="r">Ціна упаковки</th><th class="r">В упаковці</th>
        <th>Од.</th><th class="r">Ціна за од.</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:12px">
      <button class="kc-btn" data-action="add-product">+ Продукт</button>
    </div>
  </div>`;
}

/* ----- components ----- */

function compTotalsHTML(c) {
  return `
    <div class="kc-lead total"><span class="n">Собівартість партії (${qf(num(c.yieldQty))} г)</span>
      <span class="dots"></span><span class="v kc-price">${fmt(compCost(c))}</span></div>
    <div class="kc-lead"><span class="n">Ціна за 1 г</span>
      <span class="dots"></span><span class="v">${fmt(compUnitCost(c))}</span></div>`;
}

function renderComps() {
  const list = db.components.map(c => `
    <button class="kc-li${c.id === ui.selComp ? " on" : ""}" data-action="sel-comp" data-id="${c.id}">
      ${esc(c.name)}<small><span data-cu="${c.id}">${fmt(compUnitCost(c))}</span> / г</small>
    </button>`).join("");

  const c = compById(ui.selComp);
  let editor;
  if (!c) {
    editor = `<div class="kc-panel kc-empty">Оберіть складник ліворуч або додайте новий.</div>`;
  } else {
    const lines = c.lines.map(l => {
      const p = productById(l.productId);
      return `<tr>
        <td><select class="kc-inp" data-bindsel="1" data-t="compline" data-cid="${c.id}" data-id="${l.id}" data-k="productId">
          ${productOptions(l.productId, false)}</select></td>
        <td style="width:90px"><input class="kc-inp num" inputmode="decimal" value="${esc(l.qty)}"
          data-bind="1" data-t="compline" data-cid="${c.id}" data-id="${l.id}" data-k="qty"></td>
        <td style="width:40px" class="kc-dim">${p ? esc(p.uom) : ""}</td>
        <td class="r kc-price" style="width:90px" data-lc="${c.id}:${l.id}">${p ? fmt(num(l.qty) * unitPrice(p)) : "—"}</td>
        <td style="width:30px"><button class="kc-x" data-action="del-compline" data-cid="${c.id}" data-id="${l.id}">×</button></td>
      </tr>`;
    }).join("");

    editor = `<div class="kc-panel">
      <div class="kc-flex">
        <div style="flex:1 1 220px">
          <div class="kc-sect first">Назва</div>
          <input class="kc-inp" value="${esc(c.name)}"
            data-bind="1" data-t="comp" data-id="${c.id}" data-k="name">
        </div>
        <div style="width:130px">
          <div class="kc-sect first">Вихід, г</div>
          <input class="kc-inp num" inputmode="decimal" value="${esc(c.yieldQty)}"
            data-bind="1" data-t="comp" data-id="${c.id}" data-k="yieldQty">
        </div>
      </div>
      <div class="kc-sect">Рецептура</div>
      <table class="kc-table"><tbody>${lines}</tbody></table>
      <div class="kc-flex" style="margin-top:10px">
        <button class="kc-btn" data-action="add-compline" data-cid="${c.id}">+ Інгредієнт</button>
        <button class="kc-x txt" data-action="del-comp" data-id="${c.id}">Видалити складник</button>
      </div>
      <hr class="kc-hr" style="margin:16px 0">
      <div id="comp-totals">${compTotalsHTML(c)}</div>
    </div>`;
  }

  return `<div class="kc-grid">
    <div class="kc-panel">
      <div class="kc-list">${list}</div>
      <div style="margin-top:10px"><button class="kc-btn" data-action="add-comp">+ Складник</button></div>
    </div>
    ${editor}
  </div>`;
}

/* ----- receipt ----- */

function receiptHTML(d, opts) {
  const { snapshotBtn, ts, expandKey, delSnapId } = opts || {};
  const compRows = d.compRows.map((r, i) => {
    const open = expandKey && ui.expanded[i];
    const expBtn = expandKey && r.ingredients.length
      ? ` <button class="kc-exp" data-action="toggle-ingr" data-idx="${i}">${open ? "згорнути" : "склад"}</button>`
      : "";
    const subs = open ? r.ingredients.map(g => `
      <div class="kc-lead sub"><span class="n">${esc(g.name)}, ${qf(g.qty)} ${esc(g.uom)}</span>
        <span class="dots"></span><span class="v">${fmt(g.cost)}</span></div>`).join("") : "";
    return `<div>
      <div class="kc-lead"><span class="n">${esc(r.name)}, ${qf(r.qty)} г${expBtn}</span>
        <span class="dots"></span><span class="v">${fmt(r.cost)}</span></div>${subs}
    </div>`;
  }).join("");

  const extras = d.extraRows.length ? `<hr class="kc-hr">` + d.extraRows.map(r => `
    <div class="kc-lead"><span class="n">${esc(r.name)}${r.qty !== 1 ? `, ${qf(r.qty)} ${esc(r.uom)}` : ""}</span>
      <span class="dots"></span><span class="v">${fmt(r.cost)}</span></div>`).join("") : "";

  const actions = [];
  if (snapshotBtn) actions.push(`<button class="kc-btn acc" data-action="snapshot">Зафіксувати розрахунок</button>`);
  actions.push(`<button class="kc-btn" data-action="print"${delSnapId ? ` data-snap="${delSnapId}"` : ""}>Друк</button>`);
  if (delSnapId) actions.push(`<button class="kc-x txt" data-action="del-snap" data-id="${delSnapId}">видалити</button>`);

  return `<div class="kc-receipt">
    <div class="kc-rt">${esc(d.itemName)}</div>
    <div class="kc-rs">${esc(d.sizeName)}${ts ? " · " + esc(ts) : ""}</div>
    ${compRows}${extras}
    <hr class="kc-hr">
    <div class="kc-lead total"><span class="n">Собівартість</span>
      <span class="dots"></span><span class="v">${fmt(d.cost)}</span></div>
    <div class="kc-lead"><span class="n">Робота</span>
      <span class="dots"></span><span class="v">${fmt(d.labor)}</span></div>
    <div class="kc-lead"><span class="n">Прибуток, ${qf(d.margin)}%</span>
      <span class="dots"></span><span class="v">${fmt((d.cost + d.labor) * (d.margin / 100))}</span></div>
    <div class="kc-final"><span class="lbl">До сплати</span><span class="p">${fmt(d.priceRounded)}</span></div>
    <div class="kc-exact">точно: ${fmt(d.price)}</div>
    <div class="no-print" style="margin-top:14px;text-align:center;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      ${actions.join("")}
    </div>
  </div><div class="kc-saw"></div>`;
}

/* ----- items ----- */

function currentItemSize() {
  const item = itemById(ui.selItem) || db.items[0];
  if (!item) return {};
  if (item.id !== ui.selItem) { ui.selItem = item.id; ui.selSize = item.sizes[0]?.id; }
  let size = item.sizes.find(s => s.id === ui.selSize) || item.sizes[0];
  if (size && size.id !== ui.selSize) ui.selSize = size.id;
  return { item, size };
}

function renderItems() {
  const list = db.items.map(i => `
    <button class="kc-li${i.id === ui.selItem ? " on" : ""}" data-action="sel-item" data-id="${i.id}">
      ${esc(i.name)}<small>${i.sizes.length} розм. · ${i.lines.length} складників</small>
    </button>`).join("");

  const { item, size } = currentItemSize();
  let editor, receiptZone = "";

  if (!item || !size) {
    editor = `<div class="kc-panel kc-empty">Додайте виріб, щоб почати розрахунок.</div>`;
  } else {
    const lines = item.lines.map(l => {
      const c = compById(l.componentId);
      return `<tr>
        <td><select class="kc-inp" data-bindsel="1" data-t="itemline" data-iid="${item.id}" data-id="${l.id}" data-k="componentId">
          ${db.components.map(cc => `<option value="${cc.id}"${cc.id === l.componentId ? " selected" : ""}>${esc(cc.name)}</option>`).join("")}
        </select></td>
        <td style="width:84px"><input class="kc-inp num" inputmode="decimal" value="${esc(l.qty)}"
          data-bind="1" data-t="itemline" data-iid="${item.id}" data-id="${l.id}" data-k="qty"></td>
        <td style="width:26px" class="kc-dim">г</td>
        <td class="r kc-price" style="width:86px" data-ilc="${item.id}:${l.id}">${c ? fmt(num(l.qty) * compUnitCost(c)) : "—"}</td>
        <td style="width:28px"><button class="kc-x" data-action="del-itemline" data-iid="${item.id}" data-id="${l.id}">×</button></td>
      </tr>`;
    }).join("");

    const chips = item.sizes.map(s => `
      <button class="kc-chip${s.id === size.id ? " on" : ""}" data-action="sel-size" data-id="${s.id}">${esc(s.name)}</button>`).join("")
      + `<button class="kc-chip" data-action="add-size" data-iid="${item.id}">+</button>`;

    const sizeFields = [
      ["Назва розміру", "name", ""],
      ["Коефіцієнт", "factor", "num"],
      ["Робота, ₴", "labor", "num"],
      ["Прибуток, %", "marginPct", "num"]
    ].map(([label, key, cls]) => `
      <div><div class="kc-sect first">${label}</div>
        <input class="kc-inp ${cls}"${cls ? ' inputmode="decimal"' : ""} value="${esc(size[key])}"
          data-bind="1" data-t="size" data-iid="${item.id}" data-id="${size.id}" data-k="${key}">
      </div>`).join("");

    const extraLines = (size.extraLines || []).map(l => {
      const p = productById(l.productId);
      return `<tr>
        <td><select class="kc-inp" data-bindsel="1" data-t="extraline" data-iid="${item.id}" data-sid="${size.id}" data-id="${l.id}" data-k="productId">
          ${productOptions(l.productId, true)}</select></td>
        <td style="width:74px"><input class="kc-inp num" inputmode="decimal" value="${esc(l.qty)}"
          data-bind="1" data-t="extraline" data-iid="${item.id}" data-sid="${size.id}" data-id="${l.id}" data-k="qty"></td>
        <td style="width:26px" class="kc-dim">${p ? esc(p.uom) : ""}</td>
        <td class="r kc-price" style="width:86px" data-elc="${item.id}:${size.id}:${l.id}">${p ? fmt(num(l.qty) * unitPrice(p)) : "—"}</td>
        <td style="width:28px"><button class="kc-x" data-action="del-extraline" data-iid="${item.id}" data-sid="${size.id}" data-id="${l.id}">×</button></td>
      </tr>`;
    }).join("");

    editor = `<div class="kc-panel">
      <div class="kc-sect first">Назва</div>
      <input class="kc-inp" value="${esc(item.name)}"
        data-bind="1" data-t="item" data-id="${item.id}" data-k="name">

      <div class="kc-sect">Склад (на базовий розмір)</div>
      <table class="kc-table"><tbody>${lines}</tbody></table>
      <div style="margin-top:8px"><button class="kc-btn" data-action="add-itemline" data-iid="${item.id}">+ Складник</button></div>

      <div class="kc-sect">Розміри</div>
      <div class="kc-flex" style="gap:6px">${chips}</div>
      <div class="kc-sizes-grid">${sizeFields}</div>

      <div class="kc-sect">Додаткові витрати розміру</div>
      <table class="kc-table"><tbody>${extraLines}</tbody></table>
      <div class="kc-flex" style="margin-top:8px">
        <button class="kc-btn" data-action="add-extraline" data-iid="${item.id}" data-sid="${size.id}">+ Витрата</button>
        ${item.sizes.length > 1 ? `<button class="kc-x txt" data-action="del-size" data-iid="${item.id}" data-id="${size.id}">Видалити розмір</button>` : ""}
        <button class="kc-x txt" data-action="del-item" data-id="${item.id}">Видалити виріб</button>
      </div>
    </div>`;

    receiptZone = `<div id="receipt-zone">${receiptHTML(buildBreakdown(item, size), { snapshotBtn: true, expandKey: true })}</div>`;
  }

  return `<div class="kc-grid wide">
    <div class="kc-panel">
      <div class="kc-list">${list}</div>
      <div style="margin-top:10px"><button class="kc-btn" data-action="add-item">+ Виріб</button></div>
    </div>
    ${editor}
    ${receiptZone}
  </div>`;
}

/* ----- snapshots ----- */

function renderSnaps() {
  if (!db.snapshots.length) {
    return `<div class="kc-panel kc-empty">
      Поки що немає зафіксованих розрахунків. Відкрийте виріб і натисніть
      «Зафіксувати розрахунок» — знімок збереже поточні ціни, навіть якщо вони потім зміняться.
    </div>`;
  }
  return `<div class="kc-snap-grid">` + db.snapshots.map(s =>
    `<div id="snap-${s.id}">${receiptHTML(s.d, { ts: s.ts, delSnapId: s.id })}</div>`).join("") + `</div>`;
}

/* ----- main render / refresh ----- */

function render() {
  renderTabs();
  const view = document.getElementById("view");
  view.innerHTML =
    ui.tab === "products" ? renderProducts() :
    ui.tab === "comps" ? renderComps() :
    ui.tab === "snaps" ? renderSnaps() :
    renderItems();
}

/* refresh: recompute displayed numbers without rebuilding inputs (keeps focus) */
function refresh() {
  document.querySelectorAll("[data-up]").forEach(el => {
    const p = productById(el.dataset.up);
    if (p) el.textContent = fmt(unitPrice(p));
  });
  document.querySelectorAll("[data-upu]").forEach(el => {
    const p = productById(el.dataset.upu);
    if (p) el.textContent = p.uom;
  });
  document.querySelectorAll("[data-cu]").forEach(el => {
    const c = compById(el.dataset.cu);
    if (c) el.textContent = fmt(compUnitCost(c));
  });
  document.querySelectorAll("[data-lc]").forEach(el => {
    const [cid, lid] = el.dataset.lc.split(":");
    const c = compById(cid); const l = c && c.lines.find(x => x.id === lid);
    const p = l && productById(l.productId);
    el.textContent = p ? fmt(num(l.qty) * unitPrice(p)) : "—";
  });
  document.querySelectorAll("[data-ilc]").forEach(el => {
    const [iid, lid] = el.dataset.ilc.split(":");
    const i = itemById(iid); const l = i && i.lines.find(x => x.id === lid);
    const c = l && compById(l.componentId);
    el.textContent = c ? fmt(num(l.qty) * compUnitCost(c)) : "—";
  });
  document.querySelectorAll("[data-elc]").forEach(el => {
    const [iid, sid, lid] = el.dataset.elc.split(":");
    const i = itemById(iid); const s = i && i.sizes.find(x => x.id === sid);
    const l = s && s.extraLines.find(x => x.id === lid);
    const p = l && productById(l.productId);
    el.textContent = p ? fmt(num(l.qty) * unitPrice(p)) : "—";
  });
  const totals = document.getElementById("comp-totals");
  if (totals) {
    const c = compById(ui.selComp);
    if (c) totals.innerHTML = compTotalsHTML(c);
  }
  refreshReceipt();
}

function refreshReceipt() {
  const zone = document.getElementById("receipt-zone");
  if (!zone) return;
  const { item, size } = currentItemSize();
  if (item && size) zone.innerHTML = receiptHTML(buildBreakdown(item, size), { snapshotBtn: true, expandKey: true });
}

/* ================= data binding ================= */

function applyBind(el) {
  const d = el.dataset, v = el.value;
  switch (d.t) {
    case "product": {
      const p = productById(d.id); if (p) p[d.k] = v; break;
    }
    case "comp": {
      const c = compById(d.id); if (c) c[d.k] = v; break;
    }
    case "compline": {
      const c = compById(d.cid); const l = c && c.lines.find(x => x.id === d.id);
      if (l) l[d.k] = v; break;
    }
    case "item": {
      const i = itemById(d.id); if (i) i[d.k] = v; break;
    }
    case "itemline": {
      const i = itemById(d.iid); const l = i && i.lines.find(x => x.id === d.id);
      if (l) l[d.k] = v; break;
    }
    case "size": {
      const i = itemById(d.iid); const s = i && i.sizes.find(x => x.id === d.id);
      if (s) s[d.k] = v; break;
    }
    case "extraline": {
      const i = itemById(d.iid); const s = i && i.sizes.find(x => x.id === d.sid);
      const l = s && s.extraLines.find(x => x.id === d.id);
      if (l) l[d.k] = v; break;
    }
  }
}

document.addEventListener("input", e => {
  const el = e.target;
  if (!el.dataset || !el.dataset.bind) return;
  applyBind(el);
  save();
  refresh();
  if (el.dataset.t === "item" && el.dataset.k === "name") syncSidebarNames();
  if (el.dataset.t === "comp" && el.dataset.k === "name") syncSidebarNames();
  if (el.dataset.t === "size" && el.dataset.k === "name") syncSizeChip(el);
});

document.addEventListener("change", e => {
  const el = e.target;
  if (el.dataset && el.dataset.bindsel) {
    applyBind(el);
    save();
    render();
  }
});

function syncSidebarNames() {
  // keep list buttons in sync without stealing focus from the name input
  document.querySelectorAll('[data-action="sel-item"]').forEach(btn => {
    const i = itemById(btn.dataset.id);
    if (i) btn.childNodes[0].textContent = i.name;
  });
  document.querySelectorAll('[data-action="sel-comp"]').forEach(btn => {
    const c = compById(btn.dataset.id);
    if (c) btn.childNodes[0].textContent = c.name;
  });
}
function syncSizeChip(el) {
  const chip = document.querySelector(`[data-action="sel-size"][data-id="${el.dataset.id}"]`);
  if (chip) chip.textContent = el.value;
}

/* ================= usage guards ================= */

function productUsage(pid) {
  const inComps = db.components.filter(c => c.lines.some(l => l.productId === pid)).map(c => c.name);
  const inExtras = db.items.filter(i => i.sizes.some(s => (s.extraLines || []).some(l => l.productId === pid))).map(i => i.name);
  return [...inComps, ...inExtras];
}
function compUsage(cid) {
  return db.items.filter(i => i.lines.some(l => l.componentId === cid)).map(i => i.name);
}

/* ================= actions ================= */

document.addEventListener("click", e => {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const a = btn.dataset.action, d = btn.dataset;

  switch (a) {
    case "tab": ui.tab = d.id; render(); break;

    /* products */
    case "add-product":
      db.products.push({ id: uid("p"), name: "Новий продукт", packPrice: "0", packQty: "1", uom: "г", category: "product" });
      save(); render(); break;
    case "del-product": {
      const used = productUsage(d.id);
      const p = productById(d.id);
      if (used.length && !confirm(`«${p.name}» використовується у: ${used.join(", ")}.\nВсе одно видалити? Рядки з ним показуватимуть «—».`)) break;
      db.products = db.products.filter(x => x.id !== d.id);
      save(); render(); break;
    }

    /* components */
    case "sel-comp": ui.selComp = d.id; render(); break;
    case "add-comp": {
      const id = uid("c");
      db.components.push({ id, name: "Новий складник", yieldQty: "0", lines: [] });
      ui.selComp = id; save(); render(); break;
    }
    case "del-comp": {
      const used = compUsage(d.id);
      const c = compById(d.id);
      if (used.length && !confirm(`«${c.name}» використовується у: ${used.join(", ")}.\nВсе одно видалити?`)) break;
      db.components = db.components.filter(x => x.id !== d.id);
      ui.selComp = db.components[0]?.id;
      save(); render(); break;
    }
    case "add-compline": {
      const c = compById(d.cid);
      if (c) c.lines.push({ id: uid("l"), productId: db.products[0]?.id, qty: "0" });
      save(); render(); break;
    }
    case "del-compline": {
      const c = compById(d.cid);
      if (c) c.lines = c.lines.filter(x => x.id !== d.id);
      save(); render(); break;
    }

    /* items */
    case "sel-item": {
      ui.selItem = d.id;
      ui.selSize = itemById(d.id)?.sizes[0]?.id;
      ui.expanded = {};
      render(); break;
    }
    case "add-item": {
      const id = uid("i"), sid = uid("s");
      db.items.push({ id, name: "Новий виріб", lines: [], sizes: [
        { id: sid, name: "базовий", factor: "1", labor: "0", marginPct: "25", extraLines: [] } ] });
      ui.selItem = id; ui.selSize = sid; ui.expanded = {};
      save(); render(); break;
    }
    case "del-item": {
      if (!confirm("Видалити виріб разом з усіма розмірами?")) break;
      db.items = db.items.filter(x => x.id !== d.id);
      ui.selItem = db.items[0]?.id;
      ui.selSize = db.items[0]?.sizes[0]?.id;
      save(); render(); break;
    }
    case "add-itemline": {
      const i = itemById(d.iid);
      if (i) i.lines.push({ id: uid("il"), componentId: db.components[0]?.id, qty: "0" });
      save(); render(); break;
    }
    case "del-itemline": {
      const i = itemById(d.iid);
      if (i) i.lines = i.lines.filter(x => x.id !== d.id);
      save(); render(); break;
    }
    case "sel-size": ui.selSize = d.id; ui.expanded = {}; render(); break;
    case "add-size": {
      const i = itemById(d.iid);
      if (i) {
        const sid = uid("s");
        i.sizes.push({ id: sid, name: "новий", factor: "1", labor: "0", marginPct: "25", extraLines: [] });
        ui.selSize = sid;
      }
      save(); render(); break;
    }
    case "del-size": {
      const i = itemById(d.iid);
      if (i && i.sizes.length > 1) {
        i.sizes = i.sizes.filter(x => x.id !== d.id);
        ui.selSize = i.sizes[0].id;
      }
      save(); render(); break;
    }
    case "add-extraline": {
      const i = itemById(d.iid); const s = i && i.sizes.find(x => x.id === d.sid);
      if (s) {
        s.extraLines = s.extraLines || [];
        const pack = db.products.find(p => p.category === "packaging");
        s.extraLines.push({ id: uid("el"), productId: (pack || db.products[0])?.id, qty: "1" });
      }
      save(); render(); break;
    }
    case "del-extraline": {
      const i = itemById(d.iid); const s = i && i.sizes.find(x => x.id === d.sid);
      if (s) s.extraLines = s.extraLines.filter(x => x.id !== d.id);
      save(); render(); break;
    }

    /* receipt */
    case "toggle-ingr":
      ui.expanded[d.idx] = !ui.expanded[d.idx];
      refreshReceipt(); break;
    case "snapshot": {
      const { item, size } = currentItemSize();
      if (item && size) {
        db.snapshots.unshift({
          id: uid("snap"),
          ts: new Date().toLocaleString("uk-UA"),
          d: JSON.parse(JSON.stringify(buildBreakdown(item, size)))
        });
        save(); renderTabs();
        btn.textContent = "Зафіксовано ✓";
        setTimeout(() => { btn.textContent = "Зафіксувати розрахунок"; }, 1400);
      }
      break;
    }
    case "del-snap":
      db.snapshots = db.snapshots.filter(x => x.id !== d.id);
      save(); render(); break;
    case "print": {
      const zone = d.snap ? document.getElementById("snap-" + d.snap) : document.getElementById("receipt-zone");
      if (!zone) break;
      zone.id === "print-zone" || (zone.dataset.oldId = zone.id, zone.id = "print-zone");
      document.body.classList.add("pr");
      const cleanup = () => {
        document.body.classList.remove("pr");
        if (zone.dataset.oldId) { zone.id = zone.dataset.oldId; delete zone.dataset.oldId; }
        window.removeEventListener("afterprint", cleanup);
      };
      window.addEventListener("afterprint", cleanup);
      window.print();
      break;
    }

    /* import / export */
    case "export": {
      const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const aEl = document.createElement("a");
      const dt = new Date().toISOString().slice(0, 10);
      aEl.href = url;
      aEl.download = `kalkuliatsiia-${dt}.json`;
      aEl.click();
      URL.revokeObjectURL(url);
      break;
    }
    case "import": document.getElementById("import-file").click(); break;
  }
});

document.getElementById("import-file").addEventListener("change", e => {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.products) || !Array.isArray(data.components) || !Array.isArray(data.items)) {
        throw new Error("format");
      }
      if (!confirm("Імпорт замінить усі поточні дані на дані з файлу. Продовжити?")) return;
      data.snapshots = Array.isArray(data.snapshots) ? data.snapshots : [];
      db = data;
      ui.selComp = db.components[0]?.id;
      ui.selItem = db.items[0]?.id;
      ui.selSize = db.items[0]?.sizes[0]?.id;
      ui.expanded = {};
      save(); render();
    } catch (err) {
      alert("Не вдалося прочитати файл: це не схоже на експорт цього застосунку.");
    }
  };
  reader.readAsText(file);
});

/* ================= start ================= */
render();
</script>
</body>
</html>
